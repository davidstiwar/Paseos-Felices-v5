services:
  # Auth Service
  - type: web
    name: paseos-auth-service
    env: python
    plan: free
    buildCommand: cd servicios/auth-service && pip install -r requirements.txt
    startCommand: cd servicios/auth-service && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        value: https://paseos-felices-v5.vercel.app
      - key: SECRET_KEY
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 10080
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false

